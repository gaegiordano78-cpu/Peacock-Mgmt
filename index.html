<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peacock Management</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="margin: 0; background-color: #FBF9F6;">
    <div id="root"></div>

    <script type="text/babel">
      // Includiamo direttamente qui il collegamento per sicurezza
      async function loadApp() {
        const response = await fetch('./index.jsx');
        const code = await response.text();
        const transformed = Babel.transform(code, { presets: ['react'] }).code;
        eval(transformed);
      }
      
      // Aspettiamo che la finestra sia carica
      window.onload = () => {
        if (typeof React !== 'undefined') {
          // Se React è pronto, carichiamo index.jsx
          const script = document.createElement('script');
          script.type = 'text/babel';
          script.src = 'index.jsx';
          document.body.appendChild(script);
        }
      };
    </script>
</body>
</html>
