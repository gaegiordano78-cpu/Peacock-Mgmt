<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peacock Management</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: #FBF9F6; color: #3C3530; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #F0EAE0; width: 100%; max-width: 450px; }
        .logo { height: 30px; margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto; }
        label { font-size: 11px; font-weight: 700; color: #9C948A; text-transform: uppercase; display: block; margin-bottom: 8px; }
        select, input { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1.5px solid #F0EAE0; background: #FBF9F6; font-size: 16px; box-sizing: border-box; outline: none; }
        .result-box { background: #3C3530; color: white; padding: 25px; border-radius: 18px; text-align: center; margin-top: 10px; }
        .res-label { font-size: 10px; opacity: 0.6; letter-spacing: 0.1em; margin-bottom: 8px; }
        .res-value { font-size: 36px; font-weight: 700; }
        .detail { display: flex; justify-content: space-between; font-size: 12px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const initialModelle = [
            { id: "m1", nome: "Abir Aouidet" }, { id: "m2", nome: "Alessandro Mincuzzi" },
            { id: "m3", nome: "Alessia Kuli" }, { id: "m4", nome: "Alice Leccese" },
            { id: "m5", nome: "Alice Penza" }, { id: "m6", nome: "Amedeo D'Amicis" },
            { id: "m7", nome: "Andres Chen" }, { id: "m8", nome: "Angela Tesoro" },
            { id: "m9", nome: "Angelica Facchini" }, { id: "m11", nome: "Anna Gaggero" }
        ];

        function App() {
            const [fatturato, setFatturato] = useState("");
            const [selected, setSelected] = useState("");

            const val = parseFloat(fatturato) || 0;
            const fee = val * 0.20;
            const lordo = val - fee;
            const ritenuta = lordo * 0.20;
            const netto = lordo - ritenuta;

            return (
                <div>
                    <img src="https://peacockmodels.com/wp-content/uploads/2025/04/logo-peacock.svg" className="logo" />
                    <div className="card">
                        <h2 style={{fontSize: "18px", marginBottom: "25px", textAlign: "center"}}>Gestionale Compensi</h2>
                        
                        <label>Modella/o</label>
                        <select value={selected} onChange={(e) => setSelected(e.target.value)}>
                            <option value="">Seleziona...</option>
                            {initialModelle.map(m => <option key={m.id} value={m.id}>{m.nome}</option>)}
                        </select>

                        <label>Fatturato Lordo (€)</label>
                        <input type="number" placeholder="Inserisci importo" value={fatturato} onChange={(e) => setFatturato(e.target.value)} />

                        {val > 0 && (
                            <div className="result-box">
                                <div className="res-label">NETTO A PAGARE</div>
                                <div className="res-value">€{netto.toFixed(2)}</div>
                                <div className="detail">
                                    <span>Fee Agenzia (20%)</span>
                                    <span>- €{fee.toFixed(2)}</span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
