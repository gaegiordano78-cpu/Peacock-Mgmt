<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peacock Management</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: #FBF9F6; color: #3C3530; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #F0EAE0; width: 100%; max-width: 450px; }
        .logo { height: 30px; margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto; }
        label { font-size: 11px; font-weight: 700; color: #9C948A; text-transform: uppercase; display: block; margin-bottom: 8px; }
        select, input { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1.5px solid #F0EAE0; background: #FBF9F6; font-size: 16px; box-sizing: border-box; outline: none; }
        .result-box { background: #3C3530; color: white; padding: 25px; border-radius: 18px; text-align: center; margin-top: 10px; }
        .res-label { font-size: 10px; opacity: 0.6; margin-bottom: 8px; }
        .res-value { font-size: 36px; font-weight: 700; }
        .detail { display: flex; justify-content: space-between; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState } = React;

        function App() {
            const [fatturato, setFatturato] = useState("");
            const [selected, setSelected] = useState("");

            const val = parseFloat(fatturato) || 0;
            const fee = val * 0.20;
            const lordo = val - fee;
            const ritenuta = lordo * 0.20;
            const netto = lordo - ritenuta;

            const modelle = [
                "Abir Aouidet", "Alessandro Mincuzzi", "Alessia Kuli", 
                "Alice Leccese", "Alice Penza", "Amedeo D'Amicis", 
                "Andres Chen", "Angela Tesoro", "Angelica Facchini"
            ];

            return e('div', null, 
                e('img', { src: "https://peacockmodels.com/wp-content/uploads/2025/04/logo-peacock.svg", className: "logo" }),
                e('div', { className: "card" },
                    e('h2', { style: { textAlign: 'center', fontSize: '18px' } }, "Gestionale Compensi"),
                    e('label', null, "Modella/o"),
                    e('select', { value: selected, onChange: (e) => setSelected(e.target.value) },
                        e('option', { value: "" }, "Seleziona..."),
                        modelle.map(m => e('option', { key: m, value: m }, m))
                    ),
                    e('label', null, "Fatturato Lordo (€)"),
                    e('input', { 
                        type: "number", 
                        placeholder: "0.00", 
                        value: fatturato, 
                        onChange: (e) => setFatturato(e.target.value) 
                    }),
                    val > 0 ? e('div', { className: "result-box" },
                        e('div', { className: "res-label" }, "NETTO DA PAGARE"),
                        e('div', { className: "res-value" }, "€" + netto.toFixed(2)),
                        e('div', { className: "detail" }, e('span', null, "Fee Agenzia (20%)"), e('span', null, "- €" + fee.toFixed(2))),
                        e('div', { className: "detail" }, e('span', null, "Ritenuta d'acconto (20%)"), e('span', null, "- €" + ritenuta.toFixed(2)))
                    ) : null
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
